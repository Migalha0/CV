name: Weekly CV Builder

on:
  schedule:
    # 0 minute, 0 hour, everyday of month, every month, (0)sunday
    - cron: '0 0 * * 0'

  # manual operation from github actions
  workflow_dispatch:

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: run CV builder
        run: node src/scripts/curriculum_builder.js

      - name: Commit and push if index.html changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git diff-index --quiet HEAD || git commit -m "chore: automated weekly CV rebuild"
          git push